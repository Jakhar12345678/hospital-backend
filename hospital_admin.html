<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoMoreLines - Hospital Onboarding</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }</style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 p-6 space-y-6">
        
        <div class="text-center">
            <h1 class="text-2xl font-black text-blue-600">NoMoreLines Console</h1>
            <p class="text-slate-500 text-xs font-medium mt-0.5">Hospital Management & Onboarding</p>
        </div>

        <div id="registration-section" class="space-y-4">
            <h2 class="text-base font-bold text-slate-800">1. Register Your Hospital / Clinic</h2>
            
            <div class="space-y-3">
                <input id="h-name" type="text" placeholder="Hospital Name" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500">
                <input id="h-city" type="text" placeholder="City" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500">
                <input id="h-phone" type="text" placeholder="Hospital Contact Mobile Number" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500">
            </div>

            <button onclick="registerHospital()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl text-sm transition-all shadow-md cursor-pointer">
                Register Hospital
            </button>
        </div>

        <div id="doctor-section" class="hidden space-y-4 pt-4 border-t border-slate-100">
            <div class="bg-emerald-50 text-emerald-800 p-3 rounded-xl text-xs font-semibold text-center">
                🎉 Hospital Registered Successfully! Now add your doctors.
            </div>
            <h2 class="text-base font-bold text-slate-800">2. Add Doctor & OPD Schedule</h2>
            <div class="space-y-3">
                <input id="doc-name" type="text" placeholder="Doctor Name" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500">
                <input id="doc-time" type="text" placeholder="OPD Timing" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500">
                <input id="doc-avg" type="number" placeholder="Avg Time per Patient (mins)" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <button onclick="addDoctor()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl text-sm transition-all shadow-md cursor-pointer">
                + Add Doctor
            </button>
        </div>

    </div>

    <script>
        let currentHospitalName = "";

        async function registerHospital() {
            const name = document.getElementById('h-name').value.trim();
            const city = document.getElementById('h-city').value.trim();
            const phone = document.getElementById('h-phone').value.trim();

            if(!name || !city || !phone) {
                alert("Kripya saari details bharein!");
                return;
            }

            try {
                const url = `http://127.0.0.1:8000/register_hospital?name=${encodeURIComponent(name)}&city=${encodeURIComponent(city)}&phone=${encodeURIComponent(phone)}`;
                const response = await fetch(url, { method: 'POST' });
                const data = await response.json();
                
                currentHospitalName = name;
                document.getElementById('registration-section').classList.add('opacity-50');
                document.getElementById('doctor-section').classList.remove('hidden');
                alert(data.message);
            } catch (error) { alert("Registration error!"); }
        }

        async function addDoctor() {
            const docName = document.getElementById('doc-name').value.trim();
            const docTime = document.getElementById('doc-time').value.trim();
            const docAvg = document.getElementById('doc-avg').value.trim();

            try {
                const url = `http://127.0.0.1:8000/add_doctor?hospital_name=${encodeURIComponent(currentHospitalName)}&doctor_name=${encodeURIComponent(docName)}&opd_time=${encodeURIComponent(docTime)}&avg_time=${parseInt(docAvg)}`;
                const response = await fetch(url, { method: 'POST' });
                const data = await response.json();
                if(data.status === "success") {
                    alert(data.message);
                    document.getElementById('doc-name').value = "";
                    document.getElementById('doc-time').value = "";
                    document.getElementById('doc-avg').value = "";
                }
            } catch (error) { alert("Doctor add fail"); }
        }
    </script>
</body>
</html>

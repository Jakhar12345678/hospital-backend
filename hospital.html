<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoMoreLines - Hospital Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F1F5F9; }</style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl border border-slate-200/60 p-6 space-y-6">
        
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Hospital Console</h1>
                <p class="text-sm font-semibold text-blue-600">Reception Control Panel</p>
            </div>
            <div class="flex items-center space-x-1.5 bg-red-50 px-3 py-1 rounded-full border border-red-100">
                <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                <span class="text-xs font-bold text-red-600 uppercase tracking-wider">Live</span>
            </div>
        </div>

        <div class="space-y-3 bg-slate-50 p-4 rounded-2xl border border-slate-200/60">
            <label class="text-xs font-bold text-slate-600 uppercase tracking-wider">Select Active Counter</label>
            <select id="select-hospital" onchange="updateDoctorDropdown()" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm focus:outline-none">
                <option value="">-- Choose Hospital --</option>
            </select>
            <select id="select-doctor" onchange="loadHospitalData()" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm focus:outline-none">
                <option value="">-- Choose Doctor --</option>
            </select>
        </div>

        <div id="control-panel" class="space-y-6 hidden">
            
            <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                    <h2 id="doc-title-name" class="text-base font-bold text-slate-800">Dr. --</h2>
                    <p id="doc-avg-time" class="text-xs font-medium text-slate-400">Avg Time: -- Mins</p>
                </div>
                <div class="flex bg-slate-200 p-1 rounded-xl space-x-1">
                    <button id="btn-active" onclick="toggleDoctorStatus('Active')" class="px-3 py-1.5 text-xs font-bold rounded-lg transition-all cursor-pointer">
                        🟢 Active
                    </button>
                    <button id="btn-break" onclick="toggleDoctorStatus('On Break')" class="px-3 py-1.5 text-xs font-bold rounded-lg transition-all cursor-pointer">
                        🟡 On Break
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-blue-600 text-white rounded-2xl p-5 text-center shadow-lg shadow-blue-600/20">
                    <p class="text-xs font-bold uppercase tracking-wider text-blue-100">Now Serving</p>
                    <p id="current-token" class="text-5xl font-black mt-1">0</p>
                </div>
                <div class="bg-slate-800 text-white rounded-2xl p-5 text-center shadow-lg shadow-slate-800/20">
                    <p class="text-xs font-bold uppercase tracking-wider text-slate-400">Total Registered</p>
                    <p id="total-tokens" class="text-5xl font-black mt-1">0</p>
                </div>
            </div>

            <div class="space-y-3">
                <button onclick="triggerNext()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-600/20 transition-all text-base cursor-pointer flex items-center justify-center space-x-2">
                    <span>Call Next Patient 📢</span>
                </button>
            </div>

        </div>

    </div>

    <script>
        let allData = {};

        async function loadHospitals() {
            try {
                const response = await fetch('http://127.0.0.1:8000/get_all_hospitals');
                allData = await response.json();
                const hDropdown = document.getElementById('select-hospital');
                hDropdown.innerHTML = '<option value="">-- Choose Hospital --</option>';
                for (let hName in allData) {
                    hDropdown.innerHTML += `<option value="${hName}">${hName}</option>`;
                }
            } catch (e) { console.error(e); }
        }

        document.addEventListener("DOMContentLoaded", loadHospitals);

        // Fixing lifecycle loop
        function updateDoctorDropdown() {
            const hName = document.getElementById('select-hospital').value;
            const dDropdown = document.getElementById('select-doctor');
            document.getElementById('control-panel').classList.add('hidden');
            
            if(!hName || !allData[hName]) {
                dDropdown.innerHTML = '<option value="">-- Choose Doctor --</option>';
                return;
            }

            dDropdown.innerHTML = '<option value="">-- Choose Doctor --</option>';
            let doctors = allData[hName].doctors;
            for(let dName in doctors) {
                dDropdown.innerHTML += `<option value="${dName}">Dr. ${dName}</option>`;
            }
        }

        async function loadHospitalData() {
            const hName = document.getElementById('select-hospital').value;
            const dName = document.getElementById('select-doctor').value;

            if(!hName || !dName) return;

            document.getElementById('control-panel').classList.remove('hidden');

            try {
                const response = await fetch(`http://127.0.0.1:8000/get_doctor_status?hospital_name=${encodeURIComponent(hName)}&doctor_name=${encodeURIComponent(dName)}`);
                const data = await response.json();

                document.getElementById('doc-title-name').innerText = "Dr. " + dName;
                document.getElementById('doc-avg-time').innerText = "Avg Time: " + data.avg_time + " Mins/Patient";
                document.getElementById('current-token').innerText = data.current_token;
                document.getElementById('total-tokens').innerText = data.total_tokens;

                const activeBtn = document.getElementById('btn-active');
                const breakBtn = document.getElementById('btn-break');

                if (data.status === "Active") {
                    activeBtn.className = "px-3 py-1.5 text-xs font-bold rounded-lg bg-white text-emerald-700 shadow-sm cursor-pointer";
                    breakBtn.className = "px-3 py-1.5 text-xs font-bold text-slate-500 cursor-pointer";
                } else {
                    breakBtn.className = "px-3 py-1.5 text-xs font-bold bg-white text-amber-700 shadow-sm cursor-pointer";
                    activeBtn.className = "px-3 py-1.5 text-xs font-bold text-slate-500 cursor-pointer";
                }
            } catch (error) { console.error(error); }
        }

        async function triggerNext() {
            const hName = document.getElementById('select-hospital').value;
            const dName = document.getElementById('select-doctor').value;
            try {
                await fetch(`http://127.0.0.1:8000/next_patient_dynamic?hospital_name=${encodeURIComponent(hName)}&doctor_name=${encodeURIComponent(dName)}`, { method: 'POST' });
                loadHospitalData();
            } catch (error) { alert("Error calling next patient"); }
        }

        async function toggleDoctorStatus(status) {
            const hName = document.getElementById('select-hospital').value;
            const dName = document.getElementById('select-doctor').value;
            try {
                // Connecting to dynamic backend route
                await fetch(`http://127.0.0.1:8000/toggle_status_dynamic?hospital_name=${encodeURIComponent(hName)}&doctor_name=${encodeURIComponent(dName)}&status_type=${status}`, { method: 'POST' });
                loadHospitalData();
            } catch (error) { alert("Status change fail!"); }
        }

        setInterval(loadHospitalData, 3000);
    </script>
</body>
</html>
